add_newline = true
format = "$directory$git_branch$git_status$line_break$character"

[directory]
truncation_length = 3

[git_branch]
format = "[$branch]($style) "

[git_status]
format = "([$all_status$ahead_behind]($style) )"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold blue)"

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
